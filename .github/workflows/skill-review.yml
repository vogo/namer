name: Skill Review
on:
  pull_request:
    paths: ['**/SKILL.md']
jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: tesslio/skill-review-and-optimize@bff9490027d60847df6494fdac7dccfb3ad82948
        with:
          optimize: true
          tessl-token: ${{ secrets.TESSL_API_TOKEN }}
